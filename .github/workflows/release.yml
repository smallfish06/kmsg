name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.260620.0). Optional."
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14
    env:
      RELEASE_ASSET_NAME: kmsg-macos-universal

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Swift 6.0
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.0"

      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          TAG=""
          SOURCE=""

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            INPUT_TAG='${{ inputs.tag }}'
            INPUT_TAG="$(printf '%s' "$INPUT_TAG" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"

            if [[ -n "$INPUT_TAG" ]]; then
              TAG="$INPUT_TAG"
              SOURCE="dispatch_input"
            else
              RAW_VERSION="$(sed -n '1p' VERSION | tr -d '\r')"
              RAW_VERSION="$(printf '%s' "$RAW_VERSION" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"

              if [[ -z "$RAW_VERSION" ]]; then
                echo "Unable to resolve release tag from VERSION file"
                exit 1
              fi

              TAG="v$RAW_VERSION"
              SOURCE="version_file_fallback"
            fi
          else
            TAG="${GITHUB_REF_NAME}"
            SOURCE="push_ref"
          fi

          if [[ -z "$TAG" ]]; then
            echo "Unable to resolve release tag"
            exit 1
          fi

          export TAG
          python3 <<'PY'
          import datetime as dt
          import os
          import re

          tag = os.environ["TAG"]
          match = re.fullmatch(r"v(\d+)\.(\d{2})(\d{2})(\d{2})\.(\d+)", tag)
          if match is None:
              print(f"Invalid tag '{tag}'. Expected format: vMAJOR.YYMMDD.PATCH_COUNT")
              raise SystemExit(1)

          major, year_suffix, month, day, patch_count = (int(part) for part in match.groups())
          if major < 1:
              print(f"Invalid tag '{tag}'. MAJOR must be >= 1")
              raise SystemExit(1)

          if patch_count < 0:
              print(f"Invalid tag '{tag}'. PATCH_COUNT must be >= 0")
              raise SystemExit(1)

          try:
              dt.date(2000 + year_suffix, month, day)
          except ValueError:
              print(f"Invalid tag '{tag}'. YYMMDD must resolve to a real calendar date")
              raise SystemExit(1)
          PY

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "source=$SOURCE" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $TAG"
          echo "Resolved tag source: $SOURCE"

      - name: Check out release tag for dispatch input
        if: steps.meta.outputs.source == 'dispatch_input'
        shell: bash
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail

          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null 2>&1; then
            git checkout --force --detach "refs/tags/$TAG"
            echo "Building from tag $TAG ($(git rev-parse --short HEAD))"
          else
            echo "::warning::Tag $TAG does not exist locally; building from the current ref. The version check will enforce VERSION/tag consistency."
          fi

      - name: Build universal binary
        shell: bash
        run: |
          set -euo pipefail
          swift --version

          swift build -c release --arch arm64
          swift build -c release --arch x86_64

          ARM_BIN_DIR="$(swift build -c release --arch arm64 --show-bin-path)"
          X86_BIN_DIR="$(swift build -c release --arch x86_64 --show-bin-path)"

          ARM_BIN="$ARM_BIN_DIR/kmsg"
          X86_BIN="$X86_BIN_DIR/kmsg"

          test -f "$ARM_BIN"
          test -f "$X86_BIN"

          lipo -create -output "$RELEASE_ASSET_NAME" "$ARM_BIN" "$X86_BIN"
          chmod +x "$RELEASE_ASSET_NAME"
          file "$RELEASE_ASSET_NAME"
          lipo -info "$RELEASE_ASSET_NAME"

      - name: Verify binary version matches release tag
        shell: bash
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail

          EXPECTED="${TAG#v}"
          ACTUAL="$(./"$RELEASE_ASSET_NAME" --version | tr -d '[:space:]')"

          if [[ "$ACTUAL" != "$EXPECTED" ]]; then
            echo "::error::Built binary version '$ACTUAL' does not match release tag '$TAG' (expected '$EXPECTED')."
            exit 1
          fi
          echo "Binary version matches release tag: $ACTUAL"

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_TARGET="$(git rev-parse HEAD)"

          if gh release view "$TAG" > /dev/null 2>&1; then
            gh release upload "$TAG" "$RELEASE_ASSET_NAME" --clobber
          else
            gh release create "$TAG" "$RELEASE_ASSET_NAME" --title "$TAG" --generate-notes --target "$RELEASE_TARGET"
          fi
